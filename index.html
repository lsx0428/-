<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>機車改裝預覽</title>

<style>
body{
    font-family: Arial;
    background:#111;
    color:white;
    text-align:center;
}

.container{
    max-width:900px;
    margin:auto;
}

.preview{
    position:relative;
    display:inline-block;
}

.preview img{
    max-width:100%;
    border-radius:10px;
}

.part{
    position:absolute;
    pointer-events:none;
    display:none;
}

.controls{
    margin-top:20px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#00c3ff;
    color:white;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>🏍️ 我的機車改裝預覽</h2>

<input type="file" id="upload">

<div class="preview">

    <!-- 原車 -->
    <img id="bike">

    <!-- 改裝件 -->
    <img id="windshield" class="part"
        src="https://i.imgur.com/4AiXzf8.png"
        style="top:10%; left:35%; width:30%;">

    <img id="exhaust" class="part"
        src="https://i.imgur.com/Z6X9a6L.png"
        style="top:65%; left:60%; width:25%;">

    <img id="sticker" class="part"
        src="https://i.imgur.com/qIufhof.png"
        style="top:40%; left:30%; width:20%;">

</div>

<div class="controls">
    <button onclick="toggle('windshield')">風鏡</button>
    <button onclick="toggle('exhaust')">排氣管</button>
    <button onclick="toggle('sticker')">貼紙</button>
</div>

</div>

<script>

// 上傳照片
document.getElementById("upload").onchange = e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function(evt){
        document.getElementById("bike").src = evt.target.result;
    };

    reader.readAsDataURL(file);
};

// 顯示/隱藏改裝
function toggle(id){
    const part = document.getElementById(id);

    if(part.style.display==="block")
        part.style.display="none";
    else
        part.style.display="block";
}

</script>

</body>
</html>
