<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>機車改裝模擬器</title>

<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

.preview{
    position:relative;
    display:inline-block;
    max-width:90%;
}

.preview img{
    max-width:100%;
    border-radius:10px;
}

.part{
    position:absolute;
    cursor:grab;
    width:150px;
    touch-action:none;
}

.controls{
    margin-top:15px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#00c3ff;
    color:white;
}
</style>
</head>

<body>

<h2>🏍️ 機車改裝模擬器 PRO</h2>

<input type="file" id="upload"><br><br>

<div class="preview" id="preview">

    <img id="bike">

    <img src="https://i.imgur.com/4AiXzf8.png"
         class="part" id="windshield"
         style="top:50px; left:100px; display:none;">

    <img src="https://i.imgur.com/Z6X9a6L.png"
         class="part" id="exhaust"
         style="top:200px; left:200px; display:none;">

</div>

<div class="controls">
    <button onclick="toggle('windshield')">風鏡</button>
    <button onclick="toggle('exhaust')">排氣管</button>
    <button onclick="resize(1.1)">放大</button>
    <button onclick="resize(0.9)">縮小</button>
</div>

<script>

// 上傳車照片
upload.onchange = e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = evt=>{
        bike.src = evt.target.result;
    };

    reader.readAsDataURL(file);
};

// 顯示改裝
function toggle(id){
    const el = document.getElementById(id);
    el.style.display =
        el.style.display==="none" ? "block":"none";
}

// 拖曳功能（手機+電腦）
let selected=null;
let offsetX=0, offsetY=0;

document.querySelectorAll(".part").forEach(el=>{

    el.addEventListener("pointerdown",e=>{
        selected=el;
        offsetX=e.offsetX;
        offsetY=e.offsetY;
        el.setPointerCapture(e.pointerId);
    });

    el.addEventListener("pointermove",e=>{
        if(!selected) return;

        const rect =
            document.getElementById("preview")
            .getBoundingClientRect();

        selected.style.left =
            (e.clientX-rect.left-offsetX)+"px";

        selected.style.top =
            (e.clientY-rect.top-offsetY)+"px";
    });

    el.addEventListener("pointerup",()=>{
        selected=null;
    });
});

// 縮放
function resize(scale){
    if(!selected) return;

    const w = selected.offsetWidth;
    selected.style.width = (w*scale)+"px";
}

</script>

</body>
</html>
